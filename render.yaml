services:

  # ── Backend: Python web service ─────────────────────────────────────────────
  - type: web
    name: pricehunt-backend
    runtime: python
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: RAKUTEN_API_KEY
        sync: false
      # REDIS_URL intentionally omitted — agent runs without caching.
      # Add a Redis instance and set REDIS_URL here to enable caching.

# NOTE: Frontend is deployed separately as a Static Site:
# New → Static Site → same repo → Root Directory: frontend
# Build Command: sed -i "s|http://localhost:8000|https://pricehunt-backend.onrender.com|g" index.html
# Publish Directory: .
