services:

  # ── Backend: Python web service ─────────────────────────────────────────────
  - type: web
    name: pricehunt-backend
    runtime: python
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: RAKUTEN_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: pricehunt-redis
          property: connectionString

  # ── Redis: free 25MB instance ───────────────────────────────────────────────
  - type: redis
    name: pricehunt-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

# NOTE: The frontend (frontend/index.html) is a static site.
# Deploy it separately in Render dashboard:
# New → Static Site → connect same repo → Root Directory: frontend
# Build Command: sed -i "s|http://localhost:8000|https://pricehunt-backend.onrender.com|g" index.html
# Publish Directory: .
